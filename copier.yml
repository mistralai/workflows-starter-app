_min_copier_version: "9.0.0"
_subdirectory: "template"

_tasks:
  - "uv sync"

project_name:
  type: str
  default: "my-workflow"
  help: "Project name"

mistral_api_key:
  type: str
  secret: true
  default: ""
  help: "Mistral API key"

deployment_name:
  type: str
  default: "default"
  help: "Deployment name base (typically the machine hostname); combined with the project name and a random suffix to isolate deployments"

deployment_suffix:
  type: str
  when: false
  default: "{% set chars = 'abcdefghijklmnopqrstuvwxyz0123456789' %}{{ chars|random }}{{ chars|random }}{{ chars|random }}{{ chars|random }}"
