name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.2.3, 1.0.0a1, 1.0.0rc1)"
        required: true
        type: string
      commit:
        description: "Commit SHA to release (default: latest commit on the selected branch)"
        required: false
        type: string
        default: ""

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-latest
    steps:
      # Only stable + pre-release (a/b/rc) versions are accepted. .dev and
      # .post suffixes are rejected on purpose.
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+((a|b|rc)[0-9]+)?$'; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi

      - name: Verify tag does not exist
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          refs=$(gh api "repos/${REPOSITORY}/git/matching-refs/tags/mistralai-workflows-cli/v${VERSION}" --jq '.[].ref') \
            || { echo "::error::Failed to look up tag mistralai-workflows-cli/v${VERSION}"; exit 1; }
          if echo "$refs" | grep -qx "refs/tags/mistralai-workflows-cli/v${VERSION}"; then
            echo "::error::Tag mistralai-workflows-cli/v${VERSION} already exists"
            exit 1
          fi

      # A bare commit SHA is repo-global, so without this guard a run could
      # publish a commit from any feature branch. Only main is allowed.
      - name: Verify commit is on main
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT: ${{ inputs.commit }}
          REPOSITORY: ${{ github.repository }}
        run: |
          SHA="${COMMIT:-$GITHUB_SHA}"
          main_tip=$(gh api "repos/${REPOSITORY}/git/ref/heads/main" --jq '.object.sha') \
            || { echo "::error::Failed to look up main"; exit 1; }
          # compare/{tip}...{SHA} reports "behind" or "identical" when SHA is an
          # ancestor of (or equal to) the main tip.
          status=$(gh api "repos/${REPOSITORY}/compare/${main_tip}...${SHA}" --jq '.status') \
            || { echo "::error::Failed to compare ${SHA} against main"; exit 1; }
          if [ "$status" = "behind" ] || [ "$status" = "identical" ]; then
            echo "Commit ${SHA} is on main (status: ${status})."
            exit 0
          fi
          echo "::error::Commit ${SHA} is not on main"
          exit 1

  tests:
    name: Tests
    needs: validate
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ inputs.commit }}

  build:
    name: Build package
    needs: [tests]
    runs-on: ubuntu-latest
    env:
      # Pin the version from the dispatch input instead of deriving it from a
      # git tag (the tag is only created after a successful publish).
      UV_DYNAMIC_VERSIONING_BYPASS: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.commit }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0

      - name: Build package
        run: |
          uv build --no-sources --sdist --wheel
          echo "Built packages:"
          ls -l dist/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The `pypi` environment must be configured with required reviewers; the run
    # pauses here until a team member approves the deployment.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      # Do NOT use skip-existing: a partial re-run from a different commit would
      # silently skip the publish and create a version mismatch on PyPI.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          print-hash: true
          verbose: true

  tag:
    name: Create release tag
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.commit }}

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag "mistralai-workflows-cli/v${VERSION}"
          git push origin "mistralai-workflows-cli/v${VERSION}"
