name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Install copier
        run: uv tool install copier

      - name: Run integration tests
        run: make integration-test
